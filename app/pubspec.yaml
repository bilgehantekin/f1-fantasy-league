name: gridcall
description: "GridCall — F1 prediction league"
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.10.4
  flutter_riverpod: ^2.6.1
  go_router: ^16.0.0
  intl: ^0.20.2
  sentry_flutter: ^9.7.0
  fl_chart: ^1.1.1
  flutter_local_notifications: ^19.5.0
  permission_handler: ^12.0.1
  timezone: ^0.10.1
  share_plus: 10.1.4
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  purchases_flutter: ^10.0.2
  purchases_ui_flutter: ^10.0.2
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  ios: true
  android: false
  remove_alpha_ios: true
  image_path: assets/branding/app_icon.png

flutter_native_splash:
  color: "#050507"
  image: assets/branding/splash_full.png
  fullscreen: true
  android_12:
    color: "#050507"
    image: assets/branding/splash_full.png
  ios: false
  android: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/branding/
  fonts:
    - family: TitilliumWeb
      fonts:
        - asset: assets/fonts/TitilliumWeb-Regular.ttf
          weight: 400
        - asset: assets/fonts/TitilliumWeb-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/TitilliumWeb-Bold.ttf
          weight: 700
        - asset: assets/fonts/TitilliumWeb-Black.ttf
          weight: 900
