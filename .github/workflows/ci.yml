name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  supabase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Type-check edge functions
        run: |
          set -euo pipefail
          find supabase/functions -mindepth 2 -maxdepth 2 -name index.ts -print | sort | while read -r fn; do
            echo "deno check $fn"
            deno check "$fn"
          done
      - name: Start Supabase + run pgTAP tests
        run: |
          supabase start
          supabase test db
